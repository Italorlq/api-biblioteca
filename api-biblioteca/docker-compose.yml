services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: biblioteca
    ports:
      - "5432:5432"
    volumes:
      - dados_postgres:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: senha123
      DB_NAME: biblioteca
      PORT: 3000
    depends_on:
      - postgres

volumes:
  dados_postgres:
